# Production Deployment Workflow for AI service
name: Production

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: production

        permissions:
            contents: read
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build docker image
              run: |
                docker build -t ai-service .

            - name: Tag docker image
              run: |
                docker tag user-service:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/ai-service:latest

            - name: Push docker image to ECR
              run: |
                docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/ai-service:latest

            - name: Deploy to ECS
              run: |
                  aws ecs update-service \
                  --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
                  --service ${{ secrets.ECS_SERVICE_NAME }} \
                  --force-new-deployment